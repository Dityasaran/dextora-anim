name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir site_out
          cp index.html site_out/
          cp playground.html site_out/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site_out

      - id: deployment
        uses: actions/deploy-pages@v4
